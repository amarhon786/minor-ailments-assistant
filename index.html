<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Minor Ailments Prescribing Assistant — Ontario</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

<style>
  :root {
    --bg: #FAF7F2;
    --bg-deep: #F2EDE3;
    --surface: #FFFFFF;
    --ink: #1A1A1F;
    --ink-soft: #4A4A52;
    --ink-faint: #8B8B92;
    --rule: #E5E0D5;
    --rule-strong: #D0C9B8;
    --primary: #0E4F4F;
    --primary-hover: #0A3A3A;
    --primary-soft: #E0EFEE;
    --accent: #B5470F;
    --accent-soft: #F4E4D5;
    --success: #265E3D;
    --success-soft: #DEE8DE;
    --warn: #8A5A00;
    --warn-soft: #F4ECCF;
    --stop: #8E2828;
    --stop-soft: #F0DCDC;
    --shadow-sm: 0 1px 2px rgba(26,26,31,.04);
    --shadow-md: 0 4px 12px rgba(26,26,31,.06), 0 1px 3px rgba(26,26,31,.04);
    --shadow-lg: 0 12px 32px rgba(26,26,31,.08), 0 2px 6px rgba(26,26,31,.04);
    --font-display: "Newsreader", Georgia, serif;
    --font-body: "IBM Plex Sans", -apple-system, system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, "SF Mono", monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    font-size: 17px;
    line-height: 1.55;
    color: var(--ink);
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 0%, rgba(14,79,79,.025) 0%, transparent 50%),
      radial-gradient(circle at 100% 50%, rgba(181,71,15,.018) 0%, transparent 50%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  ::selection { background: var(--primary-soft); color: var(--ink); }

  /* Typography */
  h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 500; letter-spacing: -0.01em; line-height: 1.15; margin: 0; color: var(--ink); }
  h1 { font-size: 2.75rem; font-weight: 500; }
  h2 { font-size: 2rem; }
  h3 { font-size: 1.5rem; }
  h4 { font-size: 1.15rem; font-weight: 600; }
  p { margin: 0 0 1em 0; }
  .display-italic { font-family: var(--font-display); font-style: italic; font-weight: 400; }
  .mono { font-family: var(--font-mono); font-size: 0.9em; }
  .eyebrow {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    font-weight: 500;
  }

  /* Layout */
  .app { min-height: 100vh; display: flex; flex-direction: column; }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--rule);
    padding: 14px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.92);
  }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-display);
    font-size: 1.15rem; font-weight: 500; color: var(--ink);
    text-decoration: none;
  }
  .logo-mark {
    width: 32px; height: 32px;
    background: var(--primary);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    color: white;
    flex-shrink: 0;
  }
  .logo-mark svg { display: block; }
  .pharmacy-tag {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--ink-faint);
    padding: 4px 10px;
    border: 1px solid var(--rule);
    border-radius: 100px;
    background: var(--bg);
  }
  .save-indicator {
    display: flex; align-items: center; gap: 6px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--ink-faint);
  }
  .save-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--success);
  }

  .demo-banner {
    background: var(--accent-soft);
    color: var(--accent);
    border-bottom: 1px solid #E8C8AA;
    padding: 8px 28px;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    text-align: center;
    font-weight: 500;
  }

  main {
    flex: 1;
    padding: 48px 28px 80px;
    max-width: 880px;
    margin: 0 auto;
    width: 100%;
  }
  main.wide { max-width: 1100px; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 36px;
    box-shadow: var(--shadow-sm);
  }
  .card-tight { padding: 24px; }
  .card-feature {
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 14px;
    padding: 36px 36px 32px;
    box-shadow: var(--shadow-md);
    position: relative;
    overflow: hidden;
  }
  .card-feature::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
  }

  /* Buttons */
  .btn {
    font-family: var(--font-body);
    font-size: 1rem;
    font-weight: 500;
    padding: 14px 22px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s ease;
    line-height: 1.2;
    min-height: 48px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }
  .btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn-secondary {
    background: var(--surface);
    color: var(--ink);
    border-color: var(--rule-strong);
  }
  .btn-secondary:hover { background: var(--bg); border-color: var(--ink-soft); }
  .btn-ghost {
    background: transparent;
    color: var(--ink-soft);
  }
  .btn-ghost:hover { color: var(--ink); background: var(--bg); }
  .btn-danger {
    background: var(--stop);
    color: white;
  }
  .btn-danger:hover { background: #6F1F1F; }
  .btn-large {
    padding: 18px 28px;
    font-size: 1.05rem;
    min-height: 56px;
  }
  .btn-block { width: 100%; }
  .btn[disabled] { opacity: 0.45; cursor: not-allowed; transform: none !important; }

  /* Choice buttons (one-question-per-screen) */
  .choice-stack { display: flex; flex-direction: column; gap: 12px; margin-top: 28px; }
  .choice {
    background: var(--surface);
    border: 1.5px solid var(--rule);
    border-radius: 10px;
    padding: 20px 24px;
    font-family: var(--font-body);
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--ink);
    text-align: left;
    cursor: pointer;
    transition: all 0.12s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 64px;
  }
  .choice:hover {
    border-color: var(--primary);
    background: var(--primary-soft);
    transform: translateY(-1px);
  }
  .choice:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }
  .choice-letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--bg-deep);
    color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    font-weight: 600;
    flex-shrink: 0;
  }
  .choice:hover .choice-letter { background: var(--primary); color: white; }
  .choice-content { flex: 1; }
  .choice-arrow { color: var(--ink-faint); font-size: 1.2rem; }
  .choice:hover .choice-arrow { color: var(--primary); transform: translateX(2px); }

  /* Form inputs */
  .field { margin-bottom: 22px; }
  .label {
    display: block;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .label-hint {
    display: block;
    font-size: 0.85rem;
    color: var(--ink-faint);
    margin-top: 4px;
    font-weight: 400;
  }
  .input, .textarea, .select {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid var(--rule-strong);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 1rem;
    background: var(--surface);
    color: var(--ink);
    transition: border-color 0.12s, box-shadow 0.12s;
    min-height: 48px;
  }
  .input:focus, .textarea:focus, .select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-soft);
  }
  .textarea { min-height: 90px; resize: vertical; line-height: 1.5; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) {
    .field-row { grid-template-columns: 1fr; }
  }

  /* Progress dots */
  .progress {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 28px;
  }
  .progress-dot {
    height: 6px;
    flex: 1;
    background: var(--rule);
    border-radius: 100px;
    transition: background 0.3s ease;
  }
  .progress-dot.done { background: var(--primary); }
  .progress-dot.current { background: var(--primary); position: relative; }
  .progress-dot.current::after {
    content: "";
    position: absolute;
    inset: -4px;
    background: var(--primary);
    opacity: 0.15;
    border-radius: 100px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  /* Citation badge */
  .citation {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--ink-faint);
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: 4px 10px;
    border-radius: 100px;
  }

  /* Stop / red flag */
  .stop-card {
    background: var(--stop-soft);
    border: 1.5px solid var(--stop);
    border-radius: 14px;
    padding: 36px;
  }
  .stop-card .eyebrow { color: var(--stop); }
  .stop-card h2 { color: var(--stop); }

  /* Success */
  .success-card {
    background: var(--success-soft);
    border: 1.5px solid var(--success);
    border-radius: 14px;
    padding: 36px;
  }
  .success-card .eyebrow { color: var(--success); }

  /* Tags */
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 100px;
    font-size: 0.78rem;
    font-weight: 500;
    font-family: var(--font-mono);
  }
  .tag-success { background: var(--success-soft); color: var(--success); }
  .tag-warn { background: var(--warn-soft); color: var(--warn); }
  .tag-stop { background: var(--stop-soft); color: var(--stop); }
  .tag-neutral { background: var(--bg-deep); color: var(--ink-soft); }

  /* Tables / review */
  .review-list {
    border-top: 1px solid var(--rule);
  }
  .review-item {
    border-bottom: 1px solid var(--rule);
    padding: 14px 0;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: start;
  }
  .review-question { color: var(--ink-soft); font-size: 0.95rem; }
  .review-answer { font-weight: 500; color: var(--ink); text-align: right; }

  /* Document preview (rx, soap, handout) */
  .document {
    background: var(--surface);
    border: 1px solid var(--rule-strong);
    border-radius: 8px;
    padding: 36px 40px;
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--ink);
  }
  .document h3 {
    font-family: var(--font-display);
    font-size: 1.4rem;
    margin-bottom: 4px;
  }
  .document .doc-header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 14px;
    margin-bottom: 24px;
  }
  .document .doc-meta {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--ink-faint);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .document .soap-section {
    margin-bottom: 18px;
  }
  .document .soap-letter {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 1.6rem;
    color: var(--primary);
    margin-right: 8px;
    float: left;
    line-height: 1;
    padding-top: 4px;
  }
  .document .soap-body {
    margin-left: 36px;
  }
  .document .rx-symbol {
    font-family: var(--font-display);
    font-size: 2rem;
    color: var(--primary);
    font-weight: 600;
  }

  /* Hero (homepage) */
  .hero { text-align: center; padding: 40px 0 64px; }
  .hero h1 {
    font-size: 3.25rem;
    margin-bottom: 18px;
    letter-spacing: -0.02em;
  }
  .hero .lede {
    font-size: 1.15rem;
    color: var(--ink-soft);
    max-width: 580px;
    margin: 0 auto 36px;
  }

  .condition-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 28px;
  }
  @media (max-width: 720px) {
    .condition-grid { grid-template-columns: 1fr; }
  }
  .condition-card {
    background: var(--surface);
    border: 1.5px solid var(--rule);
    border-radius: 12px;
    padding: 24px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-height: 140px;
    font-family: inherit;
    color: inherit;
  }
  .condition-card:hover:not([disabled]) {
    border-color: var(--primary);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .condition-card[disabled] { opacity: 0.5; cursor: not-allowed; }
  .condition-card h4 { font-family: var(--font-display); font-size: 1.2rem; font-weight: 500; }
  .condition-card .desc { color: var(--ink-soft); font-size: 0.92rem; flex: 1; }

  /* Past assessments */
  .past-row {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 16px;
    align-items: center;
    padding: 16px 8px;
    margin: 0 -8px;
    border-bottom: 1px solid var(--rule);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
    text-align: left;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
    width: calc(100% + 16px);
    font-family: inherit;
    color: inherit;
  }
  .past-row:hover { background: var(--bg); }
  .past-row .past-chevron { color: var(--ink-faint); font-size: 1.1rem; transition: transform 0.12s, color 0.12s; }
  .past-row:hover .past-chevron { color: var(--primary); transform: translateX(2px); }
  .past-row:last-child { border-bottom: none; }

  /* Footer */
  footer {
    border-top: 1px solid var(--rule);
    padding: 28px;
    text-align: center;
    color: var(--ink-faint);
    font-size: 0.85rem;
    background: var(--bg-deep);
  }

  /* Header section + back button */
  .screen-header {
    margin-bottom: 28px;
  }
  .back-button {
    background: none;
    border: none;
    color: var(--ink-soft);
    font-family: var(--font-body);
    font-size: 0.92rem;
    padding: 6px 0;
    cursor: pointer;
    margin-bottom: 12px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .back-button:hover { color: var(--ink); }

  /* Misc */
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .row-end { display: flex; gap: 12px; justify-content: flex-end; flex-wrap: wrap; }
  .row-between { display: flex; gap: 12px; justify-content: space-between; align-items: center; flex-wrap: wrap; }
  .stack > * + * { margin-top: 16px; }
  .stack-lg > * + * { margin-top: 28px; }
  .text-soft { color: var(--ink-soft); }
  .text-faint { color: var(--ink-faint); }
  .small { font-size: 0.92rem; }
  .center { text-align: center; }

  hr { border: none; border-top: 1px solid var(--rule); margin: 28px 0; }

  /* Print */
  @media print {
    body { background: white; }
    .topbar, .demo-banner, footer, .no-print, .back-button { display: none !important; }
    main { padding: 0; max-width: 100%; }
    .document { border: none; box-shadow: none; padding: 0; }
    .card, .card-feature { box-shadow: none; border: none; padding: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">

const { useState, useEffect, useMemo, useRef } = React;

/* ============================================================
   STORAGE
   ============================================================ */
const STORAGE_KEY = "ma-assist-v1";

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}

function saveState(state) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    console.warn("Save failed:", e);
  }
}

const initialState = {
  pharmacy: null,
  current: null, // current in-progress assessment
  past: [],      // completed assessments
};

/* ============================================================
   ALGORITHM DEFINITIONS
   These are JSON config — to add a condition, add an entry here.
   Citations point to publicly available OCP/CPhA algorithm sources.
   ============================================================ */

const CONDITIONS = {
  uti: {
    id: "uti",
    name: "Uncomplicated UTI (Cystitis)",
    short: "UTI",
    description: "Female patients aged 16–65 with classic cystitis symptoms.",
    citation: "OCP Assessment & Prescribing Algorithm — Uncomplicated UTI (Cystitis), v.2024-10",
    estimatedTime: "3–4 min",
    available: true,
    steps: [
      {
        id: "intro",
        type: "intro",
        title: "Uncomplicated UTI Assessment",
        body: "This assessment walks through the OCP algorithm for uncomplicated cystitis. You'll be asked questions about symptoms, history, and red flags. The tool documents the assessment but does not make clinical decisions — you do.",
      },
      {
        id: "sex_at_birth",
        type: "question",
        section: "Eligibility",
        question: "Patient assigned female at birth?",
        help: "OCP UTI minor ailments scope applies to patients assigned female at birth.",
        options: [
          { label: "Yes", value: "female" },
          { label: "No", value: "male", redFlag: "Male patients with urinary symptoms require medical assessment to rule out other causes (e.g., prostatitis). Refer to physician." },
        ],
      },
      {
        id: "age",
        type: "input",
        section: "Eligibility",
        question: "Patient age (years)?",
        inputType: "number",
        validate: (v) => {
          const n = parseInt(v, 10);
          if (isNaN(n) || n < 0 || n > 120) return "Enter a valid age";
          if (n < 16) return { redFlag: "Patient under 16 — refer to physician for assessment." };
          if (n > 65) return { redFlag: "Patient over 65 — increased risk of complicated UTI. Refer to physician." };
          return null;
        },
      },
      {
        id: "pregnant",
        type: "question",
        section: "Eligibility",
        question: "Is the patient pregnant or possibly pregnant?",
        options: [
          { label: "No", value: "no" },
          { label: "Yes / Possibly", value: "yes", redFlag: "Pregnant patients with UTI require medical management. Refer to physician." },
          { label: "Unsure — patient cannot confirm", value: "unsure", redFlag: "Pregnancy status cannot be confirmed. Refer to physician for assessment." },
        ],
      },
      {
        id: "symptoms",
        type: "multiselect",
        section: "Symptoms",
        question: "Which symptoms is the patient reporting? (select all that apply)",
        help: "At least one classic symptom (dysuria, frequency, urgency, suprapubic pain) should be present.",
        options: [
          { label: "Dysuria (painful urination)", value: "dysuria" },
          { label: "Frequency", value: "frequency" },
          { label: "Urgency", value: "urgency" },
          { label: "Suprapubic pain or pressure", value: "suprapubic" },
          { label: "Visible blood in urine", value: "hematuria" },
        ],
        validate: (v) => {
          const classic = ["dysuria","frequency","urgency","suprapubic"];
          const hasClassic = v.some(x => classic.includes(x));
          if (!hasClassic) return { redFlag: "No classic UTI symptoms reported. Reassess or refer to physician." };
          return null;
        },
      },
      {
        id: "duration",
        type: "question",
        section: "Symptoms",
        question: "How long has the patient had symptoms?",
        options: [
          { label: "Less than 7 days", value: "lt7" },
          { label: "7 days or longer", value: "ge7", redFlag: "Symptoms ≥7 days suggest possible complicated infection. Refer to physician." },
        ],
      },
      {
        id: "red_flags",
        type: "multiselect",
        section: "Red flags",
        question: "Are any of the following present?",

/* ----- Assessment (one question per screen) ----- */
function AssessmentScreen({ condition, responses, onAnswer, onBack, onAbort }) {
  const cond = CONDITIONS[condition];
  const questionSteps = cond.steps.filter(s => s.type !== "intro");
  const currentIndex = questionSteps.findIndex(s => responses[s.id] === undefined);
  const introShown = responses["__intro_shown"];

  if (!introShown) {
    return <IntroScreen condition={condition} onContinue={() => onAnswer("__intro_shown", true)} onBack={onBack} />;
  }

  if (currentIndex === -1) {
    // All answered - parent handles transition
    return null;
  }

  const step = questionSteps[currentIndex];
  const total = questionSteps.length;

  return (
    <div>
      <div className="progress-meta">
        <span>Question {currentIndex + 1} of {total}</span>
        <span>{step.section || "Assessment"}</span>
      </div>
      <div className="progress">
        {questionSteps.map((_, i) => (
          <div
            key={i}
            className={`progress-dot ${i < currentIndex ? "done" : i === currentIndex ? "current" : ""}`}
          />
        ))}
      </div>
      <div className="screen-header">
        <button className="back-button" onClick={onBack}>← Back</button>
      </div>

      <div className="card-feature">
        <h2 style={{marginBottom: step.help ? 12 : 28}}>{step.question}</h2>
        {step.help && <p className="text-soft" style={{marginBottom: 28, fontSize: "1rem"}}>{step.help}</p>}

        <QuestionInput key={step.id} step={step} onAnswer={(v) => onAnswer(step.id, v)} />

        <hr style={{marginTop: 36}} />
        <div className="row-between">
          <span className="citation">📖 {cond.citation}</span>
          <button className="btn btn-ghost small" onClick={onAbort}>Abort assessment</button>
        </div>
      </div>
    </div>
  );
}

function QuestionInput({ step, onAnswer }) {
  const [value, setValue] = useState(step.type === "multiselect" ? [] : "");
  const [error, setError] = useState(null);

  const validate = (v) => {
    if (step.validate) {
      const r = step.validate(v);
      if (r) {
        if (typeof r === "string") return { error: r };
        return r; // could be { redFlag: "..." }
      }
    }
    return null;
  };

  if (step.type === "question") {
    return (
      <div className="choice-stack">
        {step.options.map((opt, i) => (
          <button
            key={opt.value}
            className="choice"
            onClick={() => onAnswer({ value: opt.value, label: opt.label, redFlag: opt.redFlag })}
          >
            <div className="row" style={{gap: 14}}>
              <span className="choice-letter">{String.fromCharCode(65 + i)}</span>
              <span className="choice-content">{opt.label}</span>
            </div>
            <span className="choice-arrow">→</span>
          </button>
        ))}
      </div>
    );
  }

  if (step.type === "multiselect") {
    return (
      <div>
        <div className="choice-stack">
          {step.options.map((opt) => {
            const checked = value.includes(opt.value);
            return (
              <button
                key={opt.value}
                className="choice"
                style={checked ? {borderColor: "var(--primary)", background: "var(--primary-soft)"} : {}}
                onClick={() => {
                  let next;
                  if (opt.value === "none") {
                    next = checked ? [] : ["none"];
                  } else {
                    if (checked) next = value.filter(v => v !== opt.value);
                    else next = [...value.filter(v => v !== "none"), opt.value];
                  }
                  setValue(next);
                  setError(null);
                }}
              >
                <div className="row" style={{gap: 14}}>
                  <span className="choice-letter" style={checked ? {background: "var(--primary)", color: "white"} : {}}>
                    {checked ? "✓" : ""}
                  </span>
                  <span className="choice-content">{opt.label}</span>
                </div>
              </button>
            );
          })}
        </div>
        {error && <p style={{color: "var(--stop)", marginTop: 12, fontSize: "0.92rem"}}>{error}</p>}
        <div className="row-end" style={{marginTop: 24}}>
          <button
            className="btn btn-primary"
            onClick={() => {
              const r = validate(value);
              if (r?.error) { setError(r.error); return; }
              const labels = value.map(v => step.options.find(o => o.value === v)?.label).filter(Boolean);
              onAnswer({ value, labels, redFlag: r?.redFlag });
            }}
          >
            Continue →
          </button>
        </div>
      </div>
    );
  }

  if (step.type === "input") {
    const isTextarea = step.inputType === "textarea";
    return (
      <div>
        {isTextarea ? (
          <textarea className="textarea" value={value} onChange={(e) => { setValue(e.target.value); setError(null); }} placeholder={step.placeholder}/>
        ) : (
          <input
            className="input"
            type={step.inputType === "number" ? "number" : "text"}
            value={value}
            onChange={(e) => { setValue(e.target.value); setError(null); }}
            placeholder={step.placeholder}
          />
        )}
        {error && <p style={{color: "var(--stop)", marginTop: 12, fontSize: "0.92rem"}}>{error}</p>}
        <div className="row-end" style={{marginTop: 24}}>
          <button
            className="btn btn-primary"
            disabled={!value && step.inputType !== "text"}
            onClick={() => {
              const r = validate(value);
              if (r?.error) { setError(r.error); return; }
              onAnswer({ value, label: value, redFlag: r?.redFlag });
            }}
          >
            Continue →
          </button>
        </div>
      </div>
    );
  }

  return null;
}

function App() {
  const [state, setState] = useState(() => loadState() || initialState);
  const [screen, setScreen] = useState(() => {
    const s = loadState();
    if (!s?.pharmacy) return "home";
    if (s?.current) return resolveScreenFromCurrent(s.current);
    return "home";
  });
  const [savedAt, setSavedAt] = useState(Date.now());
  const [viewingPast, setViewingPast] = useState({ index: null, from: "home" });

  // Persist on every state change
  useEffect(() => {
    saveState(state);
    setSavedAt(Date.now());
  }, [state]);

  function resolveScreenFromCurrent(current) {
    if (current.outcome === "red_flagged") return "red_flag";
    if (current.outcome === "completed") return "outputs";
    if (current.selectedDrug) return "outputs";
    if (current.confirmed) return "drug_select";
    const cond = CONDITIONS[current.condition];
    if (cond && current.responses) {
      const allAnswered = cond.steps
        .filter(s => s.type === "question" || s.type === "multiselect" || s.type === "input")
        .every(s => current.responses[s.id] !== undefined);
      if (allAnswered) return "review";
    }
    if (current.patient) return "assessment";
    if (current.condition) return "patient_info";
    return "condition_picker";
  }

  function startNewAssessment() {
    setState((s) => ({ ...s, current: null }));
    setScreen("condition_picker");
  }

  function pickCondition(conditionId) {
    setState((s) => ({
      ...s,
      current: {
        id: "ma-" + Date.now(),
        condition: conditionId,
        patient: null,
        responses: {},
        outcome: null,
        startedAt: Date.now(),
      },
    }));
    setScreen("patient_info");
  }

  function setPatient(patient) {
    setState((s) => ({
      ...s,
      current: { ...s.current, patient },
    }));
    setScreen("assessment");
  }

  function answerQuestion(stepId, response) {
    const cond = CONDITIONS[state.current.condition];
    const newResponses = { ...state.current.responses, [stepId]: response };

    // Check for red flag
    if (response?.redFlag) {
      setState((s) => ({
        ...s,
        current: {
          ...s.current,
          responses: newResponses,
          outcome: "red_flagged",
          redFlagReason: response.redFlag,
        },
      }));
      setScreen("red_flag");
      return;
    }

    // Check if all answered → go to review
    const allAnswered = cond.steps
      .filter(s => s.type === "question" || s.type === "multiselect" || s.type === "input")
      .every(s => newResponses[s.id] !== undefined);

    setState((s) => ({
      ...s,
      current: { ...s.current, responses: newResponses },
    }));

    if (allAnswered) {
      setScreen("review");
    }
  }

  function confirmReview() {
    setState((s) => ({
      ...s,
      current: { ...s.current, confirmed: true },
    }));
    setScreen("drug_select");
  }

  function selectDrug(drug) {
    setState((s) => ({
      ...s,
      current: { ...s.current, selectedDrug: drug },
    }));
    setScreen("outputs");
  }

  function completeAssessment() {
    const completed = {
      ...state.current,
      outcome: "prescribed",
      completedAt: Date.now(),
    };
    setState((s) => ({
      ...s,
      current: null,
      past: [completed, ...s.past],
    }));
    setScreen("home");
  }

  function abortAssessment() {
    if (!confirm("Abort this assessment? It won't be saved.")) return;
    setState((s) => ({ ...s, current: null }));
    setScreen("home");
  }

  function referFromReview() {
    const referred = {
      ...state.current,
      outcome: "referred",
      completedAt: Date.now(),
      redFlagReason: "Pharmacist clinical judgment — patient referred to physician.",
    };
    setState((s) => ({
      ...s,
      current: null,
      past: [referred, ...s.past],
    }));
    setScreen("home");
  }

  function returnFromRedFlag() {
    if (state.current) {
      const referred = {
        ...state.current,
        outcome: "referred",
        completedAt: Date.now(),
      };
      setState((s) => ({
        ...s,
        current: null,
        past: [referred, ...s.past],
      }));
    }
    setScreen("home");
  }

  function clearHistory() {
    if (!confirm("Clear all assessment history? Cannot be undone.")) return;
    setState((s) => ({ ...s, past: [] }));
  }

  // Render
  let content;
  if (!state.pharmacy) {
    content = (
      <SetupScreen
        initial={null}
        onSave={(form) => {
          setState((s) => ({ ...s, pharmacy: form }));
          setScreen("home");
        }}
      />
    );
  } else {
    switch (screen) {
      case "home":
        content = (
          <HomeScreen
            pharmacy={state.pharmacy}
            current={state.current}
            past={state.past}
            onSetup={() => setScreen("setup")}
            onStart={startNewAssessment}
            onResume={() => setScreen(resolveScreenFromCurrent(state.current))}
            onViewPast={() => setScreen("past")}
            onViewPastAssessment={(i) => { setViewingPast({ index: i, from: "home" }); setScreen("view_past"); }}
          />
        );
        break;
      case "setup":
        content = (
          <SetupScreen
            initial={state.pharmacy}
            onSave={(form) => {
              setState((s) => ({ ...s, pharmacy: form }));
              setScreen("home");
            }}
            onCancel={() => setScreen("home")}
          />
        );
        break;
      case "condition_picker":
        content = (
          <ConditionPicker
            onPick={pickCondition}
            onBack={() => setScreen("home")}
          />
        );
        break;
      case "patient_info":
        content = (
          <PatientInfoScreen
            initial={state.current?.patient}
            condition={state.current.condition}
            onNext={setPatient}
            onBack={() => setScreen("condition_picker")}
          />
        );
        break;
      case "assessment":
        content = (
          <AssessmentScreen
            condition={state.current.condition}
            responses={state.current.responses}
            onAnswer={answerQuestion}
            onBack={() => setScreen("patient_info")}
            onAbort={abortAssessment}
          />
        );
        break;
      case "red_flag":
        content = (
          <RedFlagScreen
            reason={state.current.redFlagReason}
            condition={state.current.condition}
            patient={state.current.patient}
            pharmacy={state.pharmacy}
            onReturn={returnFromRedFlag}
            onGenerateReferral={() => alert("Referral note generation — feature stubbed for v1 demo. In production, this would generate a fax-ready referral letter.")}
          />
        );
        break;
      case "review":
        content = (
          <ReviewScreen
            condition={state.current.condition}
            patient={state.current.patient}
            responses={state.current.responses}
            onConfirm={confirmReview}
            onBack={() => setScreen("assessment")}
            onRefer={referFromReview}
          />
        );
        break;
      case "drug_select":
        content = (
          <DrugSelectionScreen
            condition={state.current.condition}
            onSelect={selectDrug}
            onBack={() => setScreen("review")}
          />
        );
        break;
      case "outputs":
        content = (
          <OutputsScreen
            condition={state.current.condition}
            patient={state.current.patient}
            pharmacy={state.pharmacy}
            responses={state.current.responses}
            drug={state.current.selectedDrug}
            onComplete={completeAssessment}
            onBack={() => setScreen("drug_select")}
          />
        );
        break;
      case "past":
        content = (
          <PastAssessmentsScreen
            past={state.past}
            onBack={() => setScreen("home")}
            onClear={clearHistory}
            onViewPastAssessment={(i) => { setViewingPast({ index: i, from: "past" }); setScreen("view_past"); }}
          />
        );
        break;
      case "view_past":
        if (viewingPast.index === null || !state.past[viewingPast.index]) {
          content = <HomeScreen pharmacy={state.pharmacy} current={state.current} past={state.past} onSetup={() => setScreen("setup")} onStart={startNewAssessment} onResume={() => {}} onViewPast={() => setScreen("past")} onViewPastAssessment={(i) => { setViewingPast({ index: i, from: "home" }); setScreen("view_past"); }} />;
        } else {
          content = (
            <ViewPastScreen
              assessment={state.past[viewingPast.index]}
              pharmacy={state.pharmacy}
              onBack={() => setScreen(viewingPast.from)}
            />
          );
        }
        break;
      default:
        content = <HomeScreen pharmacy={state.pharmacy} current={state.current} past={state.past} onSetup={() => setScreen("setup")} onStart={startNewAssessment} onResume={() => {}} onViewPast={() => setScreen("past")} />;
    }
  }

  return (
    <div className="app">
      <Topbar pharmacy={state.pharmacy} savedAt={savedAt} onLogoClick={() => setScreen("home")} />
      <main>{content}</main>
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
